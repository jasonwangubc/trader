services:
  postgres:
    image: postgres:16-alpine
    container_name: trader-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: trader
      POSTGRES_DB: trader
    ports:
      # Host 5433 -> container 5432; avoids conflict with a host-native Postgres on 5432.
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d trader"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
